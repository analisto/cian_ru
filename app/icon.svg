<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0a0a12"/>

  <!-- Grid lines -->
  <!-- Vertical dividers -->
  <line x1="11" y1="4"  x2="11" y2="28" stroke="#1a1a38" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="21" y1="4"  x2="21" y2="28" stroke="#1a1a38" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Horizontal dividers -->
  <line x1="4"  y1="11" x2="28" y2="11" stroke="#1a1a38" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="4"  y1="21" x2="28" y2="21" stroke="#1a1a38" stroke-width="1.5" stroke-linecap="round"/>

  <!-- X  in top-left cell (neon cyan) -->
  <line x1="5.5" y1="5.5" x2="9.5" y2="9.5" stroke="#00f5ff" stroke-width="2" stroke-linecap="round"/>
  <line x1="9.5" y1="5.5" x2="5.5" y2="9.5" stroke="#00f5ff" stroke-width="2" stroke-linecap="round"/>

  <!-- O in center cell (neon purple) -->
  <circle cx="16" cy="16" r="2.8" stroke="#bf00ff" stroke-width="2" fill="none"/>

  <!-- X in bottom-right cell (neon cyan, slightly dimmer) -->
  <line x1="22.5" y1="22.5" x2="26.5" y2="26.5" stroke="#00f5ff" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="26.5" y1="22.5" x2="22.5" y2="26.5" stroke="#00f5ff" stroke-width="2" stroke-linecap="round" opacity="0.7"/>

  <!-- Glow filter hint via a subtle outer ring -->
  <rect width="32" height="32" rx="6" fill="none" stroke="#00f5ff" stroke-width="0.5" opacity="0.25"/>
</svg>
